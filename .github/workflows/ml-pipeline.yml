# =============================================================================
# ML MODEL PIPELINE
# =============================================================================
# Trigger: push to main that changes ml/ directory
#          manual trigger (workflow_dispatch) for on-demand retraining
#
# Stages:
#   1. data-validation   — Check schema, distributions, missing values
#   2. train             — SageMaker training job (XGBoost + PyTorch)
#   3. evaluate          — Quality gates: AUC, precision, recall thresholds
#   4. register          — MLflow model registry + version tag
#   5. canary-deploy     — 10% traffic → SageMaker endpoint
#   6. promote           — 100% traffic after 30min health check
# =============================================================================

name: ML Model Pipeline

on:
  push:
    branches: [main]
    paths:
      - "ml/**"
      - ".github/workflows/ml-pipeline.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        type: choice
        options: [dev, staging, prod]
        default: dev
      force-retrain:
        description: "Force retrain even if no code changes"
        type: boolean
        default: false

env:
  AWS_REGION: us-east-1
  PYTHON_VERSION: "3.11"
  # Quality gates — pipeline fails if model falls below these
  MIN_AUC: "0.82"
  MIN_PRECISION: "0.75"
  MIN_RECALL: "0.70"
  MAX_INFERENCE_LATENCY_MS: "200"

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  # ============================================================================
  # JOB 1: DATA VALIDATION
  # Catches data quality issues before wasting compute on a training job
  # Great Expectations validates: schema, null rates, value distributions,
  # feature statistics drift vs training baseline
  # ============================================================================
  data-validation:
    name: Data Validation
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install great-expectations pandas boto3 pyarrow

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CICD_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: "ml-data-validation"

      - name: Run data validation suite
        id: validate
        run: |
          python ml/validation/validate_data.py \
            --environment ${{ github.event.inputs.environment || 'dev' }} \
            --output-path validation-results.json

      - name: Check validation results
        run: |
          python - <<'EOF'
          import json, sys

          with open("validation-results.json") as f:
              results = json.load(f)

          failed = [r for r in results["results"] if not r["success"]]
          if failed:
              print(f"❌ {len(failed)} validation(s) FAILED:")
              for r in failed:
                  print(f"  - {r['expectation_type']}: {r['result']}")
              sys.exit(1)
          else:
              print(f"✅ All {len(results['results'])} validations passed")
              print(f"  Rows validated: {results['statistics']['evaluated_expectations']}")
          EOF

      - name: Upload validation report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: data-validation-report-${{ github.sha }}
          path: validation-results.json

  # ============================================================================
  # JOB 2: TRAIN — SageMaker Training Job
  # Submits a SageMaker training job and waits for completion.
  # SageMaker runs the actual training in a separate managed environment —
  # the GitHub runner just monitors the job status.
  # ============================================================================
  train:
    name: Train Model
    needs: data-validation
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    outputs:
      job-name: ${{ steps.submit-job.outputs.job-name }}
      model-artifact-uri: ${{ steps.get-outputs.outputs.model-uri }}
      mlflow-run-id: ${{ steps.get-outputs.outputs.run-id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install boto3 sagemaker mlflow

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CICD_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: "ml-training-job"

      - name: Submit SageMaker training job
        id: submit-job
        env:
          SAGEMAKER_ROLE_ARN: ${{ secrets.SAGEMAKER_ROLE_ARN }}
          ARTIFACTS_BUCKET: ${{ secrets.ARTIFACTS_BUCKET }}
          RAW_BUCKET: ${{ secrets.RAW_BUCKET }}
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: |
          JOB_NAME="churn-train-${{ github.sha }}-$(date +%Y%m%d%H%M%S)"
          echo "job-name=$JOB_NAME" >> $GITHUB_OUTPUT

          python ml/training/submit_training_job.py \
            --job-name "$JOB_NAME" \
            --environment ${{ github.event.inputs.environment || 'dev' }} \
            --git-sha ${{ github.sha }} \
            --sagemaker-role "$SAGEMAKER_ROLE_ARN" \
            --output-path "s3://$ARTIFACTS_BUCKET/training/$JOB_NAME"

      - name: Wait for training job completion
        run: |
          python - <<'EOF'
          import boto3, time, sys

          client = boto3.client("sagemaker", region_name="${{ env.AWS_REGION }}")
          job_name = "${{ steps.submit-job.outputs.job-name }}"

          print(f"Monitoring training job: {job_name}")
          while True:
              resp = client.describe_training_job(TrainingJobName=job_name)
              status = resp["TrainingJobStatus"]
              secondary = resp.get("SecondaryStatus", "")
              print(f"  Status: {status} / {secondary}")

              if status == "Completed":
                  print("✅ Training job completed")
                  break
              elif status in ("Failed", "Stopped"):
                  reason = resp.get("FailureReason", "No reason provided")
                  print(f"❌ Training job {status}: {reason}")
                  sys.exit(1)

              time.sleep(60)  # Poll every 60 seconds
          EOF

      - name: Extract training outputs
        id: get-outputs
        run: |
          python - <<'EOF'
          import boto3, json

          client = boto3.client("sagemaker", region_name="${{ env.AWS_REGION }}")
          job = client.describe_training_job(
              TrainingJobName="${{ steps.submit-job.outputs.job-name }}"
          )
          model_uri = job["ModelArtifacts"]["S3ModelArtifacts"]
          metrics = {m["MetricName"]: m["Value"] for m in job.get("FinalMetricDataList", [])}

          print(f"Model URI: {model_uri}")
          print(f"Final metrics: {json.dumps(metrics, indent=2)}")

          with open("$GITHUB_OUTPUT", "a") as f:
              f.write(f"model-uri={model_uri}\n")
              f.write(f"run-id={job['Environment'].get('MLFLOW_RUN_ID', 'unknown')}\n")

          with open("training-metrics.json", "w") as f:
              json.dump({"job": job['TrainingJobName'], "metrics": metrics}, f)
          EOF

      - name: Upload training metrics
        uses: actions/upload-artifact@v4
        with:
          name: training-metrics-${{ github.sha }}
          path: training-metrics.json

  # ============================================================================
  # JOB 3: EVALUATE — Quality Gates
  # If the new model doesn't beat the minimum thresholds, the pipeline stops.
  # The model is NOT deployed — no need for a rollback since we never promoted it.
  # ============================================================================
  evaluate:
    name: Evaluate Model
    needs: train
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    outputs:
      passed: ${{ steps.gate-check.outputs.passed }}
      auc: ${{ steps.gate-check.outputs.auc }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install boto3 mlflow scikit-learn pandas numpy

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CICD_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: "ml-evaluation"

      - name: Run evaluation against holdout set
        id: evaluate
        env:
          MODEL_ARTIFACT_URI: ${{ needs.train.outputs.model-artifact-uri }}
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: |
          python ml/evaluation/evaluate_model.py \
            --model-uri "$MODEL_ARTIFACT_URI" \
            --mlflow-run-id "${{ needs.train.outputs.mlflow-run-id }}" \
            --output-path evaluation-results.json

      - name: Check quality gates
        id: gate-check
        run: |
          python - <<'EOF'
          import json, sys, os

          with open("evaluation-results.json") as f:
              results = json.load(f)

          auc = results["metrics"]["auc"]
          precision = results["metrics"]["precision"]
          recall = results["metrics"]["recall"]
          latency = results["metrics"].get("inference_latency_p95_ms", 0)

          gates = {
              "AUC": (auc, float("${{ env.MIN_AUC }}")),
              "Precision": (precision, float("${{ env.MIN_PRECISION }}")),
              "Recall": (recall, float("${{ env.MIN_RECALL }}")),
          }

          failures = []
          for metric, (value, threshold) in gates.items():
              status = "✅" if value >= threshold else "❌"
              print(f"  {status} {metric}: {value:.4f} (min: {threshold})")
              if value < threshold:
                  failures.append(f"{metric}={value:.4f} < {threshold}")

          if latency > float("${{ env.MAX_INFERENCE_LATENCY_MS }}"):
              failures.append(f"Latency={latency}ms > ${{ env.MAX_INFERENCE_LATENCY_MS }}ms")
              print(f"  ❌ Latency: {latency}ms (max: ${{ env.MAX_INFERENCE_LATENCY_MS }}ms)")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"auc={auc}\n")
              f.write(f"passed={'true' if not failures else 'false'}\n")

          if failures:
              print(f"\n❌ Quality gate FAILED: {', '.join(failures)}")
              print("Model will NOT be deployed.")
              sys.exit(1)
          else:
              print(f"\n✅ All quality gates passed. Model approved for deployment.")
          EOF

      - name: Comment evaluation results on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const results = JSON.parse(fs.readFileSync('evaluation-results.json'));
            const passed = "${{ steps.gate-check.outputs.passed }}" === "true";

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## Model Evaluation Results ${passed ? '✅' : '❌'}

              | Metric | Value | Threshold | Status |
              |--------|-------|-----------|--------|
              | AUC | ${results.metrics.auc?.toFixed(4)} | ${{ env.MIN_AUC }} | ${results.metrics.auc >= ${{ env.MIN_AUC }} ? '✅' : '❌'} |
              | Precision | ${results.metrics.precision?.toFixed(4)} | ${{ env.MIN_PRECISION }} | ${results.metrics.precision >= ${{ env.MIN_PRECISION }} ? '✅' : '❌'} |
              | Recall | ${results.metrics.recall?.toFixed(4)} | ${{ env.MIN_RECALL }} | ${results.metrics.recall >= ${{ env.MIN_RECALL }} ? '✅' : '❌'} |

              MLflow Run: \`${{ needs.train.outputs.mlflow-run-id }}\`
              `
            });

  # ============================================================================
  # JOB 4: REGISTER — MLflow Model Registry
  # Tags the model version with git SHA, environment, and quality gate status
  # ============================================================================
  register:
    name: Register Model
    needs: [train, evaluate]
    if: needs.evaluate.outputs.passed == 'true'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    outputs:
      model-version: ${{ steps.register.outputs.model-version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install mlflow boto3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CICD_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: "ml-register"

      - name: Register model in MLflow registry
        id: register
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: |
          python - <<'EOF'
          import mlflow, os

          client = mlflow.tracking.MlflowClient()
          run_id = "${{ needs.train.outputs.mlflow-run-id }}"
          model_uri = f"runs:/{run_id}/churn-model"

          # Register creates a versioned entry in the Model Registry
          result = mlflow.register_model(
              model_uri=model_uri,
              name="churn-prediction-model"
          )

          version = result.version
          print(f"Registered model version: {version}")

          # Tag with metadata for traceability
          client.set_model_version_tag(
              name="churn-prediction-model",
              version=version,
              key="git_sha",
              value="${{ github.sha }}"
          )
          client.set_model_version_tag(
              name="churn-prediction-model",
              version=version,
              key="environment",
              value="${{ github.event.inputs.environment || 'dev' }}"
          )
          client.set_model_version_tag(
              name="churn-prediction-model",
              version=version,
              key="auc",
              value="${{ needs.evaluate.outputs.auc }}"
          )
          client.set_model_version_tag(
              name="churn-prediction-model",
              version=version,
              key="pipeline_run_id",
              value="${{ github.run_id }}"
          )

          # Transition to Staging stage
          client.transition_model_version_stage(
              name="churn-prediction-model",
              version=version,
              stage="Staging"
          )

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"model-version={version}\n")
          EOF

  # ============================================================================
  # JOB 5: CANARY DEPLOY — 10% traffic to new model
  # SageMaker endpoint gets a second production variant with 10% weight.
  # We monitor error rates for 30 minutes before promoting.
  # ============================================================================
  canary-deploy:
    name: Canary Deploy (10%)
    needs: [train, register]
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    outputs:
      endpoint-name: ${{ steps.deploy.outputs.endpoint-name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install boto3 sagemaker

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CICD_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: "ml-canary-deploy"

      - name: Deploy canary variant to SageMaker endpoint
        id: deploy
        env:
          SAGEMAKER_ROLE_ARN: ${{ secrets.SAGEMAKER_ROLE_ARN }}
          ARTIFACTS_BUCKET: ${{ secrets.ARTIFACTS_BUCKET }}
        run: |
          python ml/deployment/canary_deploy.py \
            --model-artifact-uri "${{ needs.train.outputs.model-artifact-uri }}" \
            --model-version "${{ needs.register.outputs.model-version }}" \
            --environment "${{ github.event.inputs.environment || 'dev' }}" \
            --canary-weight 10 \
            --sagemaker-role "$SAGEMAKER_ROLE_ARN"

      - name: Monitor canary for 30 minutes
        run: |
          python - <<'EOF'
          import boto3, time, sys

          cw = boto3.client("cloudwatch", region_name="${{ env.AWS_REGION }}")
          endpoint = "${{ steps.deploy.outputs.endpoint-name }}"
          canary_variant = "canary-${{ needs.register.outputs.model-version }}"

          print(f"Monitoring canary deployment for 30 minutes...")
          print(f"Endpoint: {endpoint}, Variant: {canary_variant}")

          max_error_rate = 0.05  # 5% error rate threshold
          check_interval = 120   # Check every 2 minutes
          total_checks = 15      # 15 × 2min = 30 minutes

          for i in range(total_checks):
              time.sleep(check_interval)
              print(f"\nCheck {i+1}/{total_checks}")

              # Query 4xx error rate for the canary variant
              resp = cw.get_metric_statistics(
                  Namespace="AWS/SageMaker",
                  MetricName="Invocation4XXErrors",
                  Dimensions=[
                      {"Name": "EndpointName", "Value": endpoint},
                      {"Name": "VariantName", "Value": canary_variant},
                  ],
                  StartTime=__import__("datetime").datetime.utcnow() - __import__("datetime").timedelta(minutes=5),
                  EndTime=__import__("datetime").datetime.utcnow(),
                  Period=300,
                  Statistics=["Sum"]
              )
              errors = sum(p["Sum"] for p in resp.get("Datapoints", []))

              # Get total invocations
              total_resp = cw.get_metric_statistics(
                  Namespace="AWS/SageMaker",
                  MetricName="Invocations",
                  Dimensions=[
                      {"Name": "EndpointName", "Value": endpoint},
                      {"Name": "VariantName", "Value": canary_variant},
                  ],
                  StartTime=__import__("datetime").datetime.utcnow() - __import__("datetime").timedelta(minutes=5),
                  EndTime=__import__("datetime").datetime.utcnow(),
                  Period=300,
                  Statistics=["Sum"]
              )
              total = sum(p["Sum"] for p in total_resp.get("Datapoints", [])) or 1

              error_rate = errors / total
              print(f"  Error rate: {error_rate:.2%} ({errors}/{total} requests)")

              if error_rate > max_error_rate:
                  print(f"❌ Error rate {error_rate:.2%} exceeds threshold {max_error_rate:.2%}")
                  print("Initiating automatic rollback...")
                  sys.exit(1)  # Triggers the rollback job below

          print("\n✅ Canary healthy for 30 minutes. Ready to promote.")
          EOF

  # ============================================================================
  # JOB 6: PROMOTE — Shift 100% traffic to new model
  # Only runs if canary was healthy. Removes the old variant.
  # ============================================================================
  promote:
    name: Promote to 100%
    needs: [register, canary-deploy]
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CICD_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: "ml-promote"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install boto3 sagemaker mlflow

      - name: Promote canary to 100% traffic
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: |
          python ml/deployment/promote_model.py \
            --endpoint-name "${{ needs.canary-deploy.outputs.endpoint-name }}" \
            --model-version "${{ needs.register.outputs.model-version }}" \
            --environment "${{ github.event.inputs.environment || 'dev' }}"

      - name: Mark model as Production in MLflow
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: |
          python - <<'EOF'
          import mlflow
          client = mlflow.tracking.MlflowClient()
          client.transition_model_version_stage(
              name="churn-prediction-model",
              version="${{ needs.register.outputs.model-version }}",
              stage="Production",
              archive_existing_versions=True  # Move old Production versions to Archived
          )
          print("✅ Model version ${{ needs.register.outputs.model-version }} is now Production")
          EOF

      - name: Notify team
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "🚀 New churn model deployed to *${{ github.event.inputs.environment || 'dev' }}*",
              "blocks": [{
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "🚀 *Model deployed successfully*\nVersion: `${{ needs.register.outputs.model-version }}`\nAUC: `${{ needs.evaluate.outputs.auc }}`\nEnvironment: `${{ github.event.inputs.environment || 'dev' }}`"
                }
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # Automatic rollback if canary monitoring fails
  rollback-canary:
    name: Rollback Canary
    needs: canary-deploy
    if: failure()
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CICD_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: "ml-rollback"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install boto3 sagemaker

      - name: Rollback — restore 100% to previous model
        run: |
          python ml/deployment/rollback.py \
            --endpoint-name "${{ needs.canary-deploy.outputs.endpoint-name }}" \
            --environment "${{ github.event.inputs.environment || 'dev' }}"

      - name: Notify rollback
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "⚠️ Model canary ROLLED BACK on *${{ github.event.inputs.environment || 'dev' }}*",
              "blocks": [{"type": "section","text": {"type": "mrkdwn","text": "⚠️ *Canary rollback triggered*\nVersion `${{ needs.register.outputs.model-version }}` had errors > 5%\nPrevious model restored to 100% traffic\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}}]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
