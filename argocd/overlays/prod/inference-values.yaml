# Prod overlay — N+1 across 3 AZs, on-demand nodes only, Production model
# image.repository and image.tag injected by GitHub Actions at deploy time

env:
  ENVIRONMENT: prod
  MODEL_STAGE: Production

replicaCount: 3    # One per AZ minimum

resources:
  requests:
    cpu: "1000m"
    memory: "2Gi"
  limits:
    cpu: "2000m"
    memory: "3Gi"

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 50    # Scale earlier in prod (headroom for spikes)

# Force on-demand in prod — no Spot interruptions for serving
nodeSelector:
  node.kubernetes.io/lifecycle: on-demand

podDisruptionBudget:
  enabled: true
  minAvailable: 2    # Always keep 2 pods up during node drains

ingress:
  enabled: true
